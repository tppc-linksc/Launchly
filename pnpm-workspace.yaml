packages:
  - "apps/*"
  - "cli"
  - "services/*"

# pnpm v11+: lifecycle scripts on dependencies must be explicitly allowed (replaces onlyBuiltDependencies).
allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  core-js: true
  cpu-features: true
  esbuild: true
  prisma: true
  ssh2: true
  vue-demi: true
